[supervisord]
nodaemon=true
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid
logfile_maxbytes=50MB
logfile_backups=10
loglevel=info

[program:gen_app_config]
command=/fba/gen_app_config.sh
autostart=true
autorestart=false
startsecs=0
priority=5
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:nginx]
command=/usr/sbin/nginx -g "daemon off;"
autostart=true
autorestart=true
priority=10
stdout_events_enabled=true
stderr_events_enabled=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:fba_server]
directory=/fba/backend
command=/usr/local/bin/granian main:app --interface asgi --host 127.0.0.1 --port 8001 --workers 1 --backlog 1024 --workers-kill-timeout 120 --backpressure 2000 --log --log-level info
user=root
autostart=true
autorestart=true
startretries=5
priority=20
environment=DEMO_MODE="%(ENV_DEMO_MODE)s",DATABASE_HOST="%(ENV_DATABASE_HOST)s",DATABASE_PORT="%(ENV_DATABASE_PORT)s",DATABASE_USER="%(ENV_DATABASE_USER)s",DATABASE_PASSWORD="%(ENV_DATABASE_PASSWORD)s",DATABASE_SCHEMA="%(ENV_DATABASE_SCHEMA)s",REDIS_URL="%(ENV_REDIS_URL)s",TOKEN_SECRET_KEY="%(ENV_TOKEN_SECRET_KEY)s",OPERA_LOG_ENCRYPT_SECRET_KEY="%(ENV_OPERA_LOG_ENCRYPT_SECRET_KEY)s"
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:fba_celery_worker]
directory=/fba/backend
command=/usr/local/bin/celery -A app.core.celery_app worker --loglevel=INFO -P eventlet -c 100
user=root
autostart=true
autorestart=true
startretries=5
priority=30
environment=DEMO_MODE="%(ENV_DEMO_MODE)s",DATABASE_HOST="%(ENV_DATABASE_HOST)s",DATABASE_PORT="%(ENV_DATABASE_PORT)s",DATABASE_USER="%(ENV_DATABASE_USER)s",DATABASE_PASSWORD="%(ENV_DATABASE_PASSWORD)s",DATABASE_SCHEMA="%(ENV_DATABASE_SCHEMA)s",REDIS_URL="%(ENV_REDIS_URL)s",TOKEN_SECRET_KEY="%(ENV_TOKEN_SECRET_KEY)s",OPERA_LOG_ENCRYPT_SECRET_KEY="%(ENV_OPERA_LOG_ENCRYPT_SECRET_KEY)s"
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:fba_celery_beat]
directory=/fba/backend
command=/usr/local/bin/celery -A app.core.celery_app beat --loglevel=INFO
user=root
autostart=true
autorestart=true
startretries=5
priority=40
environment=DEMO_MODE="%(ENV_DEMO_MODE)s",DATABASE_HOST="%(ENV_DATABASE_HOST)s",DATABASE_PORT="%(ENV_DATABASE_PORT)s",DATABASE_USER="%(ENV_DATABASE_USER)s",DATABASE_PASSWORD="%(ENV_DATABASE_PASSWORD)s",DATABASE_SCHEMA="%(ENV_DATABASE_SCHEMA)s",REDIS_URL="%(ENV_REDIS_URL)s",TOKEN_SECRET_KEY="%(ENV_TOKEN_SECRET_KEY)s",OPERA_LOG_ENCRYPT_SECRET_KEY="%(ENV_OPERA_LOG_ENCRYPT_SECRET_KEY)s"
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
