[supervisord]
nodaemon=true
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid
logfile_maxbytes=50MB
logfile_backups=10
loglevel=info

[program:gen_app_config]
command=/fba/gen_app_config.sh
autostart=true
autorestart=false
startsecs=0
priority=5
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:nginx]
command=/usr/sbin/nginx -g "daemon off;"
autostart=true
autorestart=true
priority=10
stdout_events_enabled=true
stderr_events_enabled=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:fba_server]
directory=/fba/backend
command=/usr/local/bin/granian main:app --interface asgi --host 127.0.0.1 --port 8001 --workers 1 --backlog 1024 --workers-kill-timeout 120 --backpressure 2000 --log --log-level info
user=root
autostart=true
autorestart=true
startretries=5
priority=20
redirect_stderr=true
stdout_logfile=/var/log/fba/fba_server.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=5

[program:fba_celery_worker]
directory=/fba/backend
command=/usr/local/bin/celery -A app.core.celery_app worker --loglevel=INFO -P eventlet -c 100
user=root
autostart=true
autorestart=true
startretries=5
priority=30
redirect_stderr=true
stdout_logfile=/var/log/fba/fba_celery_worker.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=5

[program:fba_celery_beat]
directory=/fba/backend
command=/usr/local/bin/celery -A app.core.celery_app beat --loglevel=INFO
user=root
autostart=true
autorestart=true
startretries=5
priority=40
redirect_stderr=true
stdout_logfile=/var/log/fba/fba_celery_beat.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=5
