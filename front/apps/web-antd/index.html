<!doctype html>
<html lang="zh">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="renderer" content="webkit" />

  <!-- Primary Meta Tags -->
  <meta name="description" content="回响是一款 AI 驱动的用户反馈智能分析平台，帮助创业者、产品经理和中小企业高效收集、分析和管理用户反馈，自动生成产品洞察，加速产品迭代。" />

  <meta name="author" content="回响团队" />
  <meta name="viewport"
    content="width=device-width,initial-scale=1.0,minimum-scale=1.0,maximum-scale=1.0,user-scalable=0" />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://userecho.app/" />
  <meta property="og:title" content="回响 - AI 驱动的用户反馈智能分析平台" />
  <meta property="og:description" content="回响是一款 AI 驱动的用户反馈智能分析平台，帮助创业者、产品经理和中小企业高效收集、分析和管理用户反馈，自动生成产品洞察，加速产品迭代。" />
  <meta property="og:image" content="https://userecho.app/logo.png" />

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image" />
  <meta property="twitter:url" content="https://userecho.app/" />
  <meta property="twitter:title" content="回响 - AI 驱动的用户反馈智能分析平台" />
  <meta property="twitter:description"
    content="回响是一款 AI 驱动的用户反馈智能分析平台，帮助创业者、产品经理和中小企业高效收集、分析和管理用户反馈，自动生成产品洞察，加速产品迭代。" />
  <meta property="twitter:image" content="https://userecho.app/logo.png" />

  <!-- Canonical URL -->
  <link rel="canonical" href="https://userecho.app/" />

  <!-- Theme Color -->
  <meta name="theme-color" content="#10b981" />

  <!-- 预连接到Google Fonts（性能优化） -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="dns-prefetch" href="https://fonts.googleapis.com">

  <!-- 预连接到演示环境（优化跳转速度） -->
  <link rel="preconnect" href="https://demo.userecho.app">
  <link rel="dns-prefetch" href="https://demo.userecho.app">

  <!-- 预加载关键图片资源 -->
  <link rel="preload" href="/logo.png" as="image">

  <!-- 由 vite 注入 VITE_APP_TITLE 变量，在 .env 文件内配置 -->
  <title>回响 - AI 驱动的用户反馈智能分析平台</title>
  <link rel="icon" href="/favicon.ico" />

  <div id="app"></div>
